services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: documentcheck
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d documentcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/documentcheck
      DEBUG: "true"
      LLM_PROVIDER: ${LLM_PROVIDER:-dashscope}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      LLM_TIMEOUT_S: ${LLM_TIMEOUT_S:-300}
      LIFECYCLE_DRY_RUN: "true"
    volumes:
      - ./backend/app:/app/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import httpx; import sys; sys.exit(0 if httpx.get('http://localhost:8000/api/health').status_code == 200 else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      # Windows Docker 下 inotify 失效 → chokidar/vite 强制走轮询
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
